<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya-Kavach AI - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .login-container {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8.5px);
            -webkit-backdrop-filter: blur(8.5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-area {
            font-size: 50px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: linear-gradient(90deg, #0369a1 0%, #0284c7 100%);
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="title">Nyaya-Kavach AI</div>
        <div class="subtitle">UP Police Innovation Challenge 2026</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username (User ID)" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">Login <i class="fa-solid fa-right-to-bracket"></i></button>
            
            <div class="error-msg" id="errorMsg">Galat Username ya Password! Kripya sahi details dalein.</div>
        </form>

        <div class="footer-text">
            © 2026 Nyaya-Kavach AI. All Rights Reserved.
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Reload rokne ke liye

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // Login Details
            const correctUsername = "police_admin";
            const correctPassword = "UPPolice@2026";

            if (usernameInput === correctUsername && passwordInput === correctPassword) {
                errorMsg.style.display = "none";
                alert("Login Safal Raha! Dashboard par bheja raha hai...");
                // Direct local file 'dashboard.html' par bhejega
                window.location.href = "dashboard.html";
            } else {
                errorMsg.style.display = "block";
            }
        }
    </script>

</body>
</html>
