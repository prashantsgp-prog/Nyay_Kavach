<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nyaya-Kavach AI - BNSS Compliance Auditor</title>
    <style>
        :root { --up-navy: #001B3A; --up-gold: #ffb703; --up-red: #d62828; --up-blue: #003366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Login Screen */
        #login-section { display: flex; height: 100vh; background: #070d1f; align-items: center; justify-content: center; }
        .login-card { background: rgba(10,20,45,0.95); padding: 30px; border-radius: 15px; border: 2px solid var(--up-gold); width: 350px; text-align: center; }
        
        /* Persistent Header (Logo & Leadership) - Yeh kabhi gayab nahi hoga */
        #dashboard-section { display: none; background: #f4f6f9; min-height: 100vh; }
        .main-header { background: linear-gradient(135deg, var(--up-navy), var(--up-blue)); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--up-gold); color: white; position: sticky; top: 0; z-index: 1000; }
        .logo-box { width: 50px; height: 50px; background: white; border: 2px solid var(--up-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900; color: var(--up-navy); text-align: center; }
        .leadership-bar { display: flex; gap: 15px; margin-left: 20px; }
        .leader { text-align: center; }
        .leader-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--up-gold); background: #eee; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .label { font-size: 8px; color: var(--up-gold); font-weight: bold; margin-top: 2px; }

        /* Dashboard Content */
        .content-area { padding: 20px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <div style="margin:0 auto 10px; width:60px; height:60px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; border:2px solid var(--up-gold); font-size:9px; font-weight:bold; color:var(--up-navy);">UP<br>POLICE</div>
            <h2 style="color:var(--up-gold);">NYAYA-KAVACH AI</h2>
            <p style="color:#fff; font-size:12px; margin:10px 0;">BNSS Sec 105 Auditor</p>
            <input type="text" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
            <button onclick="login()" style="width:100%; padding:10px; background:var(--up-red); color:white; border:none; cursor:pointer;">LOGIN</button>
        </div>
    </div>

    <div id="dashboard-section">
        <header class="main-header">
            <div style="display: flex; align-items: center;">
                <div class="logo-box">UP<br>👮‍♂️<br>POLICE</div>
                <div class="leadership-bar">
                    <div class="leader"><div class="leader-img">🏛️</div><div class="label">PM</div></div>
                    <div class="leader"><div class="leader-img">🇮🇳</div><div class="label">CM</div></div>
                    <div class="leader"><div class="leader-img">👮‍♂️</div><div class="label">DGP</div></div>
                </div>
            </div>
            <button onclick="location.reload()" style="background:var(--up-red); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">LOGOUT</button>
        </header>

        <div class="content-area">
            <div class="panel">
                <h3>Case Input</h3>
                <label>CD Time:</label><input type="time" id="cd_time" onchange="runAudit()" style="width:100%; margin:5px 0 15px;">
                <label>Video Time:</label><input type="time" id="video_time" onchange="runAudit()" style="width:100%; margin:5px 0 15px;">
            </div>
            
            <div class="panel">
                <h3>AI Audit Report</h3>
                <div id="audit-result"></div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            runAudit();
        }

        function runAudit() {
            let cd = document.getElementById('cd_time').value || "14:00";
            let vid = document.getElementById('video_time').value || "16:45";
            
            document.getElementById('audit-result').innerHTML = `
                <div style="border-left: 4px solid #d62828; padding:15px; margin-top:10px; background:#fff5f5;">
                    <h4 style="color:#d62828; margin-bottom:5px;">⚠️ Time Conflict Detected</h4>
                    <p style="font-size:14px; margin-bottom:10px;">Case Diary time: <b>${cd}</b> vs e-Sakshya Video: <b>${vid}</b>.</p>
                    
                    <h4 style="color:#001B3A; margin-bottom:5px;">🛡️ Defense Exploitability Risk</h4>
                    <p style="font-size:14px; margin-bottom:10px;">High Risk. Advocate may argue police kept accused in illegal detention before seizure.</p>
                    
                    <h4 style="color:#2a9d8f; margin-bottom:5px;">💡 Rectification Suggestions</h4>
                    <ul style="font-size:14px; padding-left:20px;">
                        <li>Add technical explanation note in next Case Diary.</li>
                        <li>Re-examine Sec 161 BNSS witness to align timelines.</li>
                    </ul>
                </div>
            `;
        }
    </script>
</body>
</html>
