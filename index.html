<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nyaya-Kavach | UP Police Login</title>
    <style>
        body { margin: 0; background: #0A0F1D; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .header-top { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; }
        .tagline { color: #FFB300; font-weight: bold; margin: 10px 0; }
        .vips { display: flex; gap: 20px; margin-bottom: 30px; align-items: flex-end; }
        .vip { text-align: center; }
        .vip img { border: 2px solid #0D47A1; border-radius: 8px; }
        .login-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #0D47A1; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; }
        .captcha-box { display: flex; gap: 10px; align-items: center; }
        button { width: 100%; padding: 12px; background: #C62828; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-top">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Pradesh_Police_Seal.png" class="logo">
        <h2>NYAYA-KAVACH AI</h2>
        <div class="tagline">सुरक्षा - सेवा - न्याय | उत्तर प्रदेश पुलिस</div>
    </div>

    <div class="vips">
        <div class="vip"><img src="https://www.narendramodi.in/assets/images/narendra_modi.jpg" width="80"><div>PM</div></div>
        <div class="vip"><img src="https://up.gov.in/site/writereaddata/Gallery/1_1_2023_13_43_58.jpg" width="100"><div>CM</div></div>
        <div class="vip"><img src="https://uppolice.gov.in/site/writereaddata/siteContent/dgp_sir.jpg" width="80" onerror="this.style.display='none'"><div>DGP</div></div>
    </div>

    <div class="login-box">
        <input type="text" placeholder="Officer ID">
        <input type="password" placeholder="Password">
        <div class="captcha-box">
            <input type="text" placeholder="Captcha" id="captcha">
            <button style="width: auto;" onclick="document.getElementById('captcha').value='KAVACH26'">🔄</button>
        </div>
        <button onclick="window.location.href='dashboard.html'">LOGIN</button>
    </div>
</body>
</html>
