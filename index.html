<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nyaya-Kavach | UP Police</title>
    <style>
        :root { --up-blue: #002e6e; --up-gold: #ffb300; --up-red: #c62828; }
        body { margin: 0; background: #0A0F1D; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* Logo & Header */
        .logo { width: 100px; margin-bottom: 5px; }
        h1 { color: var(--up-gold); font-size: 24px; margin: 0; text-transform: uppercase; }
        .desc { color: #ccc; font-size: 14px; margin-bottom: 20px; text-align: center; max-width: 300px; }

        /* VIP Container */
        .vip-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .vip-box { text-align: center; }
        .vip-box img { width: 70px; height: 70px; border: 2px solid var(--up-gold); border-radius: 50%; object-fit: cover; background: #333; }
        .label { font-size: 11px; color: var(--up-gold); margin-top: 5px; }

        /* Login Card */
        .login-card { background: rgba(0, 46, 110, 0.4); padding: 25px; border-radius: 20px; border: 2px solid var(--up-gold); width: 300px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--up-gold); color: white; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: var(--up-red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Captcha */
        #captcha-display { font-size: 22px; font-weight: bold; letter-spacing: 5px; color: var(--up-gold); background: #000; padding: 10px; border: 1px solid var(--up-gold); margin: 10px 0; }
    </style>
</head>
<body>

    <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Pradesh_Police_Seal.png'" class="logo">
    <h1>NYAYA-KAVACH AI</h1>
    <p class="desc">Smart AI-driven portal for UP Police to analyze crime records, manage case files, and provide real-time investigation assistance.</p>

    <div class="vip-container">
        <div class="vip-box"><img src="pm.jpg" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/c/c3/Narendra_Modi_2023.jpg'"><div class="label">PM</div></div>
        <div class="vip-box"><img src="cm.jpg" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/e/e0/Yogi_Adityanath.jpg'"><div class="label">CM</div></div>
        <div class="vip-box"><img src="dgp.jpg" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Rajeev_Krishna.jpg/300px-Rajeev_Krishna.jpg'"><div class="label">DGP</div></div>
    </div>

    <div class="login-card">
        <input type="text" placeholder="Officer ID" id="officer-id">
        <input type="password" placeholder="Password" id="officer-password">
        
        <div id="captcha-display">------</div>
        <button style="background:var(--up-blue);" onclick="generateCaptcha()">Generate Captcha</button>
        <input type="text" placeholder="Enter Captcha" id="user-captcha">
        
        <button style="margin-top:10px;" onclick="checkLogin()">LOGIN</button>
    </div>

    <script>
        function generateCaptcha() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let captcha = "";
            for(let i=0; i<6; i++) captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captcha-display').innerText = captcha;
        }

        function checkLogin() {
            // इनपुट वैल्यूज लेना
            const id = document.getElementById('officer-id').value;
            const pass = document.getElementById('officer-password').value;
            const uCaptcha = document.getElementById('user-captcha').value;
            const rCaptcha = document.getElementById('captcha-display').innerText;

            // चेकिंग: ID, Password और Captcha
            if (id === "admin" && pass === "admin") {
                if (uCaptcha === rCaptcha) {
                    window.location.href = 'dashboard.html';
                } else {
                    alert("गलत Captcha!");
                    generateCaptcha(); // गलत पर नया कैप्चा दें
                }
            } else {
                alert("गलत Officer ID या Password!");
            }
        }
        
        generateCaptcha();
    </script>
</body>
</html>
