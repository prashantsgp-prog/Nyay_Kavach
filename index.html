<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nyaya-Kavach | UP Police</title>
    <style>
        :root { --up-blue: #002e6e; --up-gold: #ffb300; --up-red: #c62828; }
        body { margin: 0; background: linear-gradient(135deg, #0A0F1D 0%, #001533 100%); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Logo & Header */
        .logo { width: 90px; margin-bottom: 5px; filter: drop-shadow(0 0 5px rgba(255,179,0,0.5)); }
        h1 { color: var(--up-gold); margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .tagline { color: white; font-size: 14px; margin-bottom: 20px; border-bottom: 2px solid var(--up-gold); padding-bottom: 5px; }

        /* VIP Photos */
        .vip-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .vip-box { text-align: center; }
        .vip-box img { width: 90px; height: 90px; border: 3px solid var(--up-gold); border-radius: 50%; object-fit: cover; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .vip-box div { margin-top: 5px; font-weight: bold; color: var(--up-gold); }

        /* Login Card */
        .login-card { background: rgba(0, 46, 110, 0.4); padding: 30px; border-radius: 15px; border: 2px solid var(--up-gold); width: 300px; backdrop-filter: blur(10px); }
        input { width: 90%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--up-gold); color: white; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: var(--up-red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #8e0000; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Pradesh_Police_Seal.png" class="logo">
    <h1>NYAYA-KAVACH AI</h1>
    <div class="tagline">उत्तर प्रदेश पुलिस | सुरक्षा - सेवा - न्याय</div>

    <div class="vip-container">
        <div class="vip-box"><img src="pm.jpg"><div>PM</div></div>
        <div class="vip-box"><img src="cm.jpg"><div>CM</div></div>
        <div class="vip-box"><img src="dgp.jpg"><div>DGP</div></div>
    </div>

    <div class="login-card">
        <input type="text" placeholder="Officer ID">
        <input type="password" placeholder="Password">
        <div style="display:flex; gap:5px;"><input type="text" placeholder="Captcha" id="c-code"><button style="width:40%;" onclick="document.getElementById('c-code').value='UPP2026'">🔄</button></div>
        <button onclick="window.location.href='dashboard.html'">LOGIN</button>
    </div>

</body>
</html>
