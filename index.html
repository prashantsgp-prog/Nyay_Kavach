<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya-Kavach AI | UP Police</title>
    <style>
        :root { --upp-red: #C62828; --upp-blue: #0D47A1; }
        body { margin: 0; background: #0A0F1D; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Login Styles */
        #login-page { display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .logo-main { width: 100px; margin-bottom: 10px; }
        .vips { display: flex; gap: 15px; margin: 20px 0; }
        .vip-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--upp-blue); object-fit: cover; }
        .login-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--upp-blue); width: 300px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; }
        .btn-login { width: 100%; padding: 12px; background: var(--upp-red); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Dashboard Styles */
        #dashboard-page { display: none; width: 100%; max-width: 800px; padding: 20px; }
        .assistant-box { position: fixed; bottom: 20px; right: 20px; width: 320px; background: #1a2533; padding: 15px; border-radius: 15px; border: 2px solid var(--upp-blue); }
        .avatar { width: 60px; border-radius: 50%; border: 2px solid white; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="login-page">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Pradesh_Police_Seal.png" class="logo-main">
        <h3>NYAYA-KAVACH AI</h3>
        <p style="color:#FFB300;">सुरक्षा - सेवा - न्याय | उत्तर प्रदेश पुलिस</p>
        <div class="vips">
            <img src="https://www.pmindia.gov.in/wp-content/uploads/2014/06/PM-Modi.jpg" class="vip-img">
            <img src="https://up.gov.in/site/writereaddata/Gallery/1_1_2023_13_43_58.jpg" class="vip-img" style="width: 90px; height: 90px;">
            <img src="https://uppolice.gov.in/site/writereaddata/siteContent/dgp_sir.jpg" class="vip-img">
        </div>
        <div class="login-card">
            <input type="text" placeholder="Officer ID">
            <input type="password" placeholder="Password">
            <button class="btn-login" onclick="showDashboard()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard-page">
        <h1>Dashboard | UP Police</h1>
        <div class="assistant-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
            <p style="text-align: center; font-size: 14px;">जय हिंद! मैं न्याय-कवच असिस्टेंट हूँ। वर्दी के साथ मैं आपकी सेवा में तैयार हूँ।</p>
            <button class="btn-login" onclick="speakAI()">🎤 Talk to AI</button>
        </div>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'block';
        }
        function speakAI() {
            const msg = new SpeechSynthesisUtterance("जय हिंद ऑफिसर, मैं आपकी कैसे मदद कर सकता हूँ?");
            msg.lang = 'hi-IN';
            window.speechSynthesis.speak(msg);
            alert("AI असिस्टेंट सक्रिय है...");
        }
    </script>
</body>
</html>
