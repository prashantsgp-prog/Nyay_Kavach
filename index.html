<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nyaya-Kavach | UP Police</title>
    <style>
        :root { --up-blue: #002e6e; --up-gold: #ffb300; --up-red: #c62828; }
        body { margin: 0; background: linear-gradient(135deg, #0A0F1D 0%, #001533 100%); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .logo { width: 100px; margin-bottom: 10px; }
        h1 { color: var(--up-gold); font-size: 20px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* VIP Container */
        .vip-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .vip-box img { width: 80px; height: 80px; border: 2px solid var(--up-gold); border-radius: 50%; object-fit: cover; }
        
        .login-card { background: rgba(0, 46, 110, 0.4); padding: 25px; border-radius: 15px; border: 2px solid var(--up-gold); width: 280px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 7px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--up-gold); color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--up-red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #captcha-display { font-weight: bold; letter-spacing: 5px; color: var(--up-gold); background: #000; padding: 10px; border: 1px solid var(--up-gold); margin: 10px 0; display: block; }
    </style>
</head>
<body>

    <img src="logo.png" class="logo" alt="UP Police Logo">
    <h1>NYAYA-KAVACH AI</h1>

    <div class="vip-container">
        <img src="pm.jpg" alt="PM">
        <img src="cm.jpg" alt="CM">
        <img src="dgp.jpg" alt="DGP">
    </div>

    <div class="login-card">
        <input type="text" placeholder="Officer ID">
        <input type="password" placeholder="Password">
        
        <div id="captcha-display">------</div>
        <button style="background:var(--up-blue); margin-bottom:10px;" onclick="generateCaptcha()">Generate Captcha</button>
        <input type="text" placeholder="Enter Captcha" id="user-captcha">
        
        <button onclick="checkLogin()">LOGIN</button>
    </div>

    <script>
        function generateCaptcha() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let captcha = "";
            for(let i=0; i<6; i++) captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captcha-display').innerText = captcha;
        }
        
        function checkLogin() {
            const userCaptcha = document.getElementById('user-captcha').value;
            const actualCaptcha = document.getElementById('captcha-display').innerText;
            if(userCaptcha === actualCaptcha) {
                window.location.href = 'dashboard.html';
            } else {
                alert("Invalid Captcha!");
            }
        }
        generateCaptcha();
    </script>
</body>
</html>
