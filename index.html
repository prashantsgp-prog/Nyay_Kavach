<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya-Kavach | UP Police</title>
    <style>
        :root { --up-blue: #002e6e; --up-gold: #ffb300; --up-red: #c62828; }
        body { margin: 0; background: #0A0F1D; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        
        .logo { width: 80px; margin-bottom: 10px; }
        h1 { color: var(--up-gold); font-size: 22px; margin: 0; text-transform: uppercase; }
        .tagline { color: white; font-size: 13px; margin-bottom: 25px; text-align: center; }

        /* VIP Photos - फिक्स्ड साइज और अलाइनमेंट */
        .vip-container { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; align-items: flex-end; }
        .vip-box { text-align: center; }
        .vip-box img { 
            display: block; 
            border: 2px solid var(--up-gold); 
            border-radius: 50%; 
            object-fit: cover; 
            background: #333; 
        }
        /* अलग-अलग साइज */
        .s-pm { width: 90px; height: 90px; }
        .s-cm { width: 80px; height: 80px; }
        .s-dgp { width: 70px; height: 70px; }
        .label { font-size: 10px; margin-top: 5px; color: var(--up-gold); font-weight: bold; }

        .login-card { background: rgba(0, 46, 110, 0.3); padding: 20px; border-radius: 15px; border: 2px solid var(--up-gold); width: 260px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid var(--up-gold); color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--up-red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Polis_Logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/bc/Uttar_Pradesh_Police_Seal.png'" class="logo">
    <h1>NYAYA-KAVACH AI</h1>
    <div class="tagline">Official Portal | UP Police</div>

    <div class="vip-container">
        <div class="vip-box"><img src="https://www.pmindia.gov.in/wp-content/uploads/2014/06/PM-Modi.jpg" class="s-pm"><div class="label">PM</div></div>
        <div class="vip-box"><img src="https://up.gov.in/site/writereaddata/Gallery/1_1_2023_13_43_58.jpg" class="s-cm"><div class="label">CM</div></div>
        <div class="vip-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Rajeev_Krishna.jpg/300px-Rajeev_Krishna.jpg" class="s-dgp"><div class="label">DGP</div></div>
    </div>

    <div class="login-card">
        <input type="text" placeholder="Officer ID">
        <input type="password" placeholder="Password">
        <button onclick="window.location.href='dashboard.html'">LOGIN</button>
    </div>

</body>
</html>
