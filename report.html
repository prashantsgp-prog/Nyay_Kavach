<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyay-Kavach | Report Case</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }
        .header {
            background-color: #1e3a8a; /* UP Police Navy Blue */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }
        .back-btn {
            background-color: #f59e0b; /* Golden Yellow */
            color: #111827;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .form-group textarea {
            resize: vertical;
            height: 100px;
        }
        .submit-btn {
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background-color: #1d4ed8;
        }
        .success-msg {
            color: #10b981;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            display: none;
            padding: 12px;
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NYAY-KAVACH AI | Secure Portal</h1>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>E-Complaint Portal (डिजिटल शिकायत)</h2>
            
            <form id="complaintForm" onsubmit="saveToDemo(event)">
                <div class="form-group">
                    <label>Complainant Name (शिकायतकर्ता का नाम)</label>
                    <input type="text" id="name" placeholder="Apna naam likhein" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number (मोबाइल नंबर)</label>
                    <input type="tel" id="phone" placeholder="10-digit number" required>
                </div>

                <div class="form-group">
                    <label>Crime Category (अपराध का प्रकार)</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Cyber Fraud">Cyber Fraud (साइबर धोखाधड़ी)</option>
                        <option value="Theft">Theft / Loot (चोरी/लूट)</option>
                        <option value="Women Safety">Women Safety (महिला सुरक्षा)</option>
                        <option value="Other">Other (अन्य मामले)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Case Details (शिकायत का विवरण)</label>
                    <textarea id="details" placeholder="Poori jankari yahan likhein..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Case</button>
            </form>

            <div id="successMessage" class="success-msg">
                ✅ Case Registered Successfully! (Demo Mode Active)
            </div>
        </div>
    </div>

    <script>
        function saveToDemo(event) {
            event.preventDefault(); // Page refresh hone se rokne ke liye

            // Success message show karein
            document.getElementById('successMessage').style.display = 'block';
            
            // Form clear karein
            document.getElementById('complaintForm').reset();
            
            // 4 second baad success message hide karne ke liye
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
