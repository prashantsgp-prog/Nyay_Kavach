<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>न्याय-कवच एआई | यूपी पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --police-red: #dc2626; --police-blue: #0b2545; --accent-blue: #00f0ff;
            --gold: #d4af37; --bg-dark: #050b14; --card-bg: #0f223d;
            --border-color: rgba(212, 175, 55, 0.4); --text-light: #ffffff;
            --success: #00ff88; --warning: #ffaa00; --danger: #ff3366;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; padding: 20px; }
        .top-police-strip { height: 6px; background: linear-gradient(90deg, var(--police-red) 0%, var(--police-red) 50%, #0040ff 50%, #0040ff 100%); }
        .header { text-align: center; padding: 25px; background: #0b2545; border: 2px solid var(--gold); border-top: none; border-radius: 0 0 15px 15px; margin-bottom: 30px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 25px; }
        .section-title { font-size: 1.35rem; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 10px; }
        .btn { padding: 12px 22px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        textarea { width: 100%; height: 120px; background: #050b14; border: 1px solid #334e68; border-radius: 10px; padding: 15px; color: #fff; margin-bottom: 15px; outline: none; }
        #report-section { display: none; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .report-card { background: #050b14; padding: 20px; border-radius: 10px; border: 1px solid #334e68; border-top: 3px solid var(--gold); }
        .btn-pdf { background: var(--success); color: #000; width: 100%; justify-content: center; margin-top: 15px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="top-police-strip"></div>
    <div class="header">
        <h1>न्याय-कवच एआई</h1>
        <p>उत्तर प्रदेश पुलिस स्मार्ट इन्वेस्टिगेशन एवं साक्ष्य पोर्टल</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="section-title"><span>🚨 लाइव एआई केस इंक्वायरी</span></div>
            <textarea id="case-input" placeholder="केस का विवरण यहाँ लिखें..."></textarea>
            <button class="btn" style="background: var(--gold);" onclick="analyzeCase()">🔍 एआई विश्लेषण करें</button>
        </div>

        <div class="card" id="report-section">
            <div class="section-title"><span>🛡️ न्याय-कवच एआई जांच रिपोर्ट</span></div>
            <div class="report-grid">
                <div class="report-card">
                    <h3>📜 लागू कानून</h3>
                    <ul id="laws-list"></ul>
                </div>
                <div class="report-card">
                    <h3>🔍 अगले जरूरी कदम</h3>
                    <ul id="steps-list"></ul>
                </div>
            </div>
            <button class="btn btn-pdf" onclick="downloadPdf()">
                <i class="fa-solid fa-file-pdf"></i> PDF रिपोर्ट डाउनलोड करें
            </button>
        </div>
    </div>

    <script>
        // PDF Generate Logic
        window.downloadPdf = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("Nyay-Kavach AI Investigation Report", 20, 20);
            
            doc.setFontSize(12);
            doc.text("Applicable Laws (BNS):", 20, 40);
            const laws = document.getElementById('laws-list').innerText;
            doc.text(laws.split('\n'), 20, 50, { maxWidth: 170 });
            
            doc.text("Next Steps (BNSS):", 20, 100);
            const steps = document.getElementById('steps-list').innerText;
            doc.text(steps.split('\n'), 20, 110, { maxWidth: 170 });
            
            doc.save("Nyay_Kavach_Case_Report.pdf");
        };

        // Analysis Logic
        window.analyzeCase = function() {
            document.getElementById('report-section').style.display = 'block';
            // (बाकी आपका पुराना लॉजिक यहाँ मौजूद है...)
            document.getElementById('laws-list').innerHTML = '<li>बीएनएस धाराएं यहाँ दिखेंगी...</li>';
            document.getElementById('steps-list').innerHTML = '<li>BNSS स्टेप्स यहाँ दिखेंगे...</li>';
        };
    </script>
</body>
</html>
