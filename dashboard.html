<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>न्याय-कवच एआई | यूपी पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070d18;
            --card-bg: rgba(16, 28, 48, 0.95);
            --border-color: rgba(212, 175, 55, 0.3);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --accent-blue: #00f0ff;
            --text-light: #e0e6ed;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #112240 0%, var(--bg-dark) 75%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #0a192f, #112240);
            border: 2px solid var(--gold);
            border-radius: 15px;
            box-shadow: 0 0 25px var(--gold-glow);
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .header p {
            font-size: 1.1rem;
            color: #a8b2d1;
            font-weight: 600;
        }

        .status-badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge.gold-badge {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .avatar-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border-left: 5px solid var(--gold);
        }

        .avatar-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar-icon {
            width: 80px;  
            height: 80px;
            background: linear-gradient(135deg, var(--gold), #8a6f1c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--gold-glow);
            overflow: hidden; 
            border: 3px solid var(--gold); 
        }

        .ai-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .voice-controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-voice {
            background: #112240;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-voice:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        .btn-stop {
            background: #112240;
            border: 1px solid var(--danger);
            color: var(--danger);
            display: none;
        }

        .btn-stop:hover {
            background: var(--danger);
            color: #fff;
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #233554;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 15px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-demo {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--gold);
            color: var(--gold);
        }

        .btn-demo:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--gold), #b89728);
            color: #000;
            font-size: 1.05rem;
            padding: 12px 30px;
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--gold);
        }

        .priority-box {
            border: 2px solid var(--accent-blue);
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(10, 25, 47, 0.9));
        }

        .priority-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .priority-tag {
            background: var(--accent-blue);
            color: #000;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .priority-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .priority-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-blue);
        }

        .priority-item h4 {
            color: #a8b2d1;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .priority-item p {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .progress-container {
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--success));
            width: 85%;
            transition: width 0.5s ease-in-out;
        }

        #report-section {
            display: none;
        }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 768px) {
            .report-grid { grid-template-columns: 1fr; }
        }

        .report-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #233554;
        }

        .report-card h3 {
            color: var(--gold);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .report-card ul {
            list-style-position: inside;
            color: #d1d5db;
            line-height: 1.8;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .pulse {
            animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NYAYA-KAVACH AI</h1>
        <p>उत्तर प्रदेश पुलिस स्मार्ट इन्वेस्टिगेशन पोर्टल</p>
        <div class="status-badges">
