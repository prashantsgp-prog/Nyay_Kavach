<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya-Kavach AI | UP Police Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070d18;
            --card-bg: rgba(16, 28, 48, 0.85);
            --border-color: rgba(212, 175, 55, 0.3);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --accent-blue: #00f0ff;
            --text-light: #e0e6ed;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #112240 0%, var(--bg-dark) 75%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #0a192f, #112240);
            border: 2px solid var(--gold);
            border-radius: 15px;
            box-shadow: 0 0 25px var(--gold-glow);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .header p {
            font-size: 1.1rem;
            color: #a8b2d1;
            font-weight: 600;
        }

        .status-badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge.gold-badge {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* SI Kavach Avatar Box */
        .avatar-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border-left: 5px solid var(--gold);
        }

        .avatar-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar-icon {
            width: 80px;  
            height: 80px;
            background: linear-gradient(135deg, var(--gold), #8a6f1c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--gold-glow);
            overflow: hidden; 
            border: 3px solid var(--gold); 
        }

        .ai-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .voice-controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-voice {
            background: #112240;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-voice:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px var(--accent-blue);
        }

            background: #112240;
            border: 1px
