<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>न्याय-कवच एआई | यूपी पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --police-red: #dc2626; --police-blue: #0b2545; --accent-blue: #00f0ff; --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.4); --bg-dark: #050b14; --card-bg: #0f223d; --border-color: rgba(212, 175, 55, 0.4); --text-light: #ffffff; --success: #00ff88; --warning: #ffaa00; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); background-image: linear-gradient(135deg, #050b14 0%, #0b2545 100%); color: var(--text-light); min-height: 100vh; padding: 20px; }
        .top-police-strip { height: 6px; background: linear-gradient(90deg, var(--police-red) 0%, var(--police-red) 50%, #0040ff 50%, #0040ff 100%); border-radius: 5px 5px 0 0; }
        .header { text-align: center; padding: 25px; background: #0b2545; border: 2px solid var(--gold); border-top: none; border-radius: 0 0 15px 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); margin-bottom: 30px; }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .up-logo-img { width: 80px; height: 80px; object-fit: contain; }
        .header h1 { font-family: 'Rajdhani', sans-serif; font-size: 3rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .header p { font-size: 1.15rem; color: #ffffff; font-weight: 600; }
        .status-badges { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .badge { background: rgba(0, 240, 255, 0.15); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .badge.gold-badge { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4); display: block !important; }
        .btn { padding: 12px 22px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-pdf { background: #28a745; color: white; width: 100%; margin-top: 15px; justify-content: center; font-size: 1rem; }
        textarea { width: 100%; height: 120px; background: #050b14; border: 1px solid #334e68; border-radius: 10px; padding: 15px; color: #fff; font-size: 1.05rem; resize: vertical; margin-bottom: 15px; outline: none; }
        #report-section { display: none; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .report-card { background: #050b14; padding: 20px; border-radius: 10px; border: 1px solid #334e68; border-top: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div class="top-police-strip"></div>
    <div class="card" id="report-section">
        <div class="section-title">
            <i class="fa-solid fa-file-shield" style="color: var(--success);"></i>
            <span>🛡️ न्याय-कवच एआई जांच रिपोर्ट</span>
        </div>
        <div class="report-grid">
            <div class="report-card">
                <h3>📜 लागू कानून</h3>
                <ul id="laws-list"></ul>
            </div>
            <div class="report-card">
                <h3>🔍 अगले जरूरी कदम</h3>
                <ul id="steps-list"></ul>
            </div>
        </div>
        <button class="btn btn-pdf" onclick="downloadPdf()">
            <i class="fa-solid fa-file-pdf"></i> PDF रिपोर्ट डाउनलोड करें
        </button>
    </div>

    <script>
        // PDF Download Logic
        window.downloadPdf = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(16);
            doc.text("Nyay-Kavach Investigation Report", 20, 20);
            
            doc.setFontSize(12);
            doc.text("Applicable Laws:", 20, 40);
            const laws = document.getElementById('laws-list').innerText || "N/A";
            doc.text(laws, 20, 50, { maxWidth: 170 });
            
            doc.text("Action Steps:", 20, 100);
            const steps = document.getElementById('steps-list').innerText || "N/A";
            doc.text(steps, 20, 110, { maxWidth: 170 });
            
            doc.save("Nyay_Kavach_Report.pdf");
        };

        // (आपका पूरा पुराना JS लॉजिक यहाँ वैसे ही रहेगा...)
        // ... (analyzeCase, startVoice, calculateWorkload, आदि functions)
    </script>
</body>
</html>
