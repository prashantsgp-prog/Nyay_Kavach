<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Nyaya-Kavach</title>
    <style>
        body { background: #0A0F1D; color: white; margin: 0; padding: 20px; }
        .ai-assistant { position: fixed; bottom: 20px; right: 20px; width: 300px; background: #1a2533; padding: 20px; border-radius: 20px; border: 2px solid #0D47A1; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #C62828; margin: 0 auto 10px; display: block; border: 3px solid white; }
    </style>
</head>
<body>
    <h1>न्याय-कवच कंट्रोल रूम</h1>
    <div class="ai-assistant">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
        <p>जय हिंद सर! मैं आपका AI असिस्टेंट हूँ। बताइए, आज किस केस फाइल का विश्लेषण करना है?</p>
        <button onclick="startVoice()">🎤 Voice Command</button>
    </div>

    <script>
        function startVoice() {
            alert("AI असिस्टेंट अब आपकी आवाज़ सुन रहा है...");
            // यहाँ वॉइस आउटपुट का फंक्शन लगेगा
        }
    </script>
</body>
</html>
