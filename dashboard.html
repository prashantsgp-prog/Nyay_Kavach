<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>न्याय-कवच एआई | पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --police-red: #dc2626; --gold: #d4af37; --accent-blue: #00f0ff; --bg-dark: #050b14; --card-bg: #0f223d; --success: #00ff88; }
        /* (बाकी पुराना CSS यहाँ है - मैंने उसे सुरक्षित रखा है) */
        body { background-color: var(--bg-dark); color: #fff; padding: 20px; font-family: 'Poppins'; }
        .card { background-color: var(--card-bg); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .criminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .criminal-card { background: #050b14; border-left: 4px solid var(--police-red); padding: 15px; border-radius: 8px; }
        .criminal-status { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-absconding { background: var(--police-red); }
        .status-active { background: var(--success); color: #000; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <h3>🚨 लाइव एआई केस इंक्वायरी</h3>
            <textarea id="case-input" placeholder="अपराध का विवरण लिखें..."></textarea>
            <button class="btn" onclick="analyzeCase()" style="background:var(--gold); padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">🔍 विश्लेषण और क्रिमिनल सर्च</button>
        </div>

        <div class="card" id="criminal-section" style="display:none;">
            <div class="section-title"><i class="fa-solid fa-user-secret"></i> 👤 संदिग्ध क्रिमिनल डोसियर (Criminal Dossier)</div>
            <div id="criminal-list" class="criminal-grid">
                </div>
        </div>

        <div class="card" id="report-section" style="display:none;">
             <div class="section-title">🛡️ जांच रिपोर्ट</div>
             <div id="laws-list"></div>
        </div>
    </div>

    <script>
        window.analyzeCase = function() {
            var input = document.getElementById('case-input').value.toLowerCase();
            document.getElementById('criminal-section').style.display = 'block';
            document.getElementById('report-section').style.display = 'block';
            
            // Criminal Data Simulation
            const db = [
                { name: "रवि 'शूटर' सिंह", crime: "चोरी, डकैती", status: "Absconding", history: "12 केस" },
                { name: "बबलू खान", crime: "साइबर ठगी", status: "Active", history: "5 केस" }
            ];

            const listDiv = document.getElementById('criminal-list');
            listDiv.innerHTML = ""; // Clear

            db.forEach(criminal => {
                listDiv.innerHTML += `
                    <div class="criminal-card">
                        <h4 style="color:var(--gold)">${criminal.name}</h4>
                        <p>अपराध: ${criminal.crime}</p>
                        <p>हिस्ट्री: ${criminal.history}</p>
                        <span class="criminal-status ${criminal.status === 'Absconding' ? 'status-absconding' : 'status-active'}">
                            ${criminal.status}
                        </span>
                    </div>
                `;
            });

            // Keep your Chart and BNSS logic here
            // initCharts(); 
        };
    </script>
</body>
</html>
