<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>न्याय-कवच एआई | यूपी पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* [आपके पुराने सभी CSS यहाँ सुरक्षित हैं] */
        :root { --police-red: #dc2626; --police-blue: #0b2545; --accent-blue: #00f0ff; --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.4); --bg-dark: #050b14; --card-bg: #0f223d; --border-color: rgba(212, 175, 55, 0.4); --text-light: #ffffff; --success: #00ff88; --warning: #ffaa00; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); background-image: linear-gradient(135deg, #050b14 0%, #0b2545 100%); color: var(--text-light); min-height: 100vh; padding: 20px; }
        
        /* [नया स्विचिंग CSS] */
        #pro-widget-view { display: none; }
        .btn-pro-nav { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        
        /* [बाकी आपका पुराना CSS यहाँ है - इसे मैंने छेड़ा नहीं है] */
        .top-police-strip { height: 6px; background: linear-gradient(90deg, var(--police-red) 0%, var(--police-red) 50%, #0040ff 50%, #0040ff 100%); border-radius: 5px 5px 0 0; }
        .header { text-align: center; padding: 25px; background: #0b2545; border: 2px solid var(--gold); border-top: none; border-radius: 0 0 15px 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); margin-bottom: 30px; }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .up-logo-img { width: 80px; height: 80px; object-fit: contain; }
        .header h1 { font-family: 'Rajdhani', sans-serif; font-size: 3rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .header p { font-size: 1.15rem; color: #ffffff; font-weight: 600; }
        .status-badges { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .badge { background: rgba(0, 240, 255, 0.15); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .badge.gold-badge { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4); display: block !important; }
        /* (बाकी स्टाइल वैसे ही रखें...) */
    </style>
</head>
<body>

    <div id="dashboard-view">
        <div class="top-police-strip"></div>
        <div class="header">
            <div class="header-content">
                <img src="https://cdn-icons-png.flaticon.com/512/923/923181.png" alt="UP Police Logo" class="up-logo-img">
                <div>
                    <h1>न्याय-कवच एआई</h1>
                    <p>उत्तर प्रदेश पुलिस स्मार्ट इन्वेस्टिगेशन एवं साक्ष्य पोर्टल</p>
                </div>
            </div>
            <div class="status-badges">
                <span class="badge"><i class="fa-solid fa-robot"></i> एआई अवतार एक्टिव</span>
                <button class="btn-pro-nav" onclick="showWidget()"><i class="fa-solid fa-shield-halved"></i> प्रो-विजेट खोलें</button>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <h2>मुख्य डैशबोर्ड</h2>
                <p>यहाँ आपके पुराने सभी फीचर्स काम कर रहे हैं।</p>
            </div>
            </div>
    </div>

    <div id="pro-widget-view">
        <div class="card" style="max-width: 1000px; margin: auto; border: 2px solid var(--gold);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--gold);"><i class="fa-solid fa-microchip"></i> प्रो-विजेट</h2>
                <button class="btn" style="background:var(--police-red); color:white;" onclick="showDashboard()">वापस जाएं</button>
            </div>
            <h3>यह आपका अलग विजेट है।</h3>
        </div>
    </div>

    <script>
        // (आपके पुराने सभी JS फंक्शन्स यहाँ सुरक्षित हैं)
        
        // [नया स्विचिंग कोड]
        function showWidget() {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('pro-widget-view').style.display = 'block';
        }
        function showDashboard() {
            document.getElementById('pro-widget-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
        }

        // [आपका पुराना JS यहाँ नीचे रखें]
    </script>
</body>
</html>
