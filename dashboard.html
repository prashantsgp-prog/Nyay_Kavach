<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>न्याय-कवच एआई | यूपी पुलिस स्मार्ट डैशबोर्ड</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --police-red: #dc2626;
            --police-blue: #0b2545;
            --accent-blue: #00f0ff;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --bg-dark: #050b14;
            --glass-bg: rgba(11, 25, 47, 0.82);
            --border-color: rgba(212, 175, 55, 0.4);
            --text-light: #e0e6ed;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* यहाँ hq.jpg में आपकी पुलिस हेडक्वार्टर की असली फोटो लोड होगी */
            background: linear-gradient(135deg, rgba(5, 11, 20, 0.88), rgba(11, 37, 69, 0.85)), url('hq.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
        }

        /* यूपी पुलिस रेड-ब्लू टॉप स्ट्रिप */
        .top-police-strip {
            height: 6px;
            background: linear-gradient(90deg, var(--police-red) 0%, var(--police-red) 50%, #0040ff 50%, #0040ff 100%);
            border-radius: 5px 5px 0 0;
            margin-bottom: -6px;
            z-index: 10;
            position: relative;
        }

        .header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, rgba(11, 37, 69, 0.95), rgba(180, 25, 25, 0.2));
            border: 2px solid var(--gold);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 20px var(--gold-glow);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .up-logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000, 0 0 15px var(--gold-glow);
        }

        .header p {
            font-size: 1.15rem;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 1px 1px 3px #000;
        }

        .status-badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .badge.gold-badge {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(220, 38, 38, 0.3));
            border-color: var(--gold);
            color: var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* Glassmorphism Card Style */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .avatar-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border-left: 6px solid var(--police-red);
            border-right: 6px solid #0040ff;
            background: linear-gradient(90deg, rgba(220, 38, 38, 0.15) 0%, rgba(11, 25, 47, 0.85) 50%, rgba(0, 64, 255, 0.15) 100%);
        }

        .avatar-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar-icon {
            width: 85px;  
            height: 85px;
            background: linear-gradient(135deg, var(--gold), var(--police-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--gold-glow);
            overflow: hidden; 
            border: 3px solid var(--gold); 
        }

        .ai-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .voice-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-voice {
            background: linear-gradient(135deg, #0040ff, #002080);
            border: 1px solid var(--accent-blue);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 64, 255, 0.4);
        }

        .btn-voice:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px var(--accent-blue);
        }

        .btn-stop {
            background: linear-gradient(135deg, var(--police-red), #800000);
            border: 1px solid #ff6680;
            color: #fff;
            display: none;
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.5);
        }

        .btn-stop:hover {
            background: #ff0033;
            color: #fff;
        }

        /* न्यू लॉगआउट बटन स्टाइल */
        .btn-logout {
            background: linear-gradient(135deg, var(--police-red), #990000);
            border: 1px solid var(--gold);
            color: #fff;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.4);
        }
        .btn-logout:hover {
            background: #ff1a40;
            box-shadow: 0 0 15px var(--police-red);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 1.35rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px #000;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #334e68;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 1.05rem;
            resize: vertical;
            margin-bottom: 15px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-demo {
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed var(--gold);
            color: var(--gold);
        }

        .btn-demo:hover {
            background: rgba(212, 175, 55, 0.25);
            color: #fff;
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--gold), #997319);
            color: #000;
            font-size: 1.1rem;
            padding: 12px 35px;
            box-shadow: 0 0 20px var(--gold-glow);
            font-weight: 700;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #f3e5ab, var(--gold));
            box-shadow: 0 0 30px var(--gold);
        }

        /* Red-Blue Special Priority Module */
        .priority-box {
            border: 2px solid var(--accent-blue);
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.15), rgba(11, 25, 47, 0.9), rgba(0, 64, 255, 0.15));
            position: relative;
            overflow: hidden;
        }

        .priority-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--police-red);
        }

        .priority-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

            background: linear-gradient(90deg, var
